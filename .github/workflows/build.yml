name: build
on:
  push:
    branches: [ '*' ]
    paths: [ 'impl/**', '.github/workflows/build.yml' ]
  pull_request:
    branches: [ '*' ]
    paths: [ 'impl/**', '.github/workflows/build.yml' ]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '17' ]
        os: [ ubuntu-latest ]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
      - name: Resolve API branch
        id: api
        run: echo "ref=$(git config -f .gitmodules submodule.faces.branch)" >> "$GITHUB_OUTPUT"
      - name: Checkout API
        uses: actions/checkout@v5
        with:
          repository: jakartaee/faces
          ref: ${{ steps.api.outputs.ref }}
          path: faces
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven
      - name: Build with Maven
        run: mvn -B -ntp clean install -Papi
