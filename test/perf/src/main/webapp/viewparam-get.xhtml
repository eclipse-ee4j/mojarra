<html lang="#{facesContext.viewRoot.locale.language}"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
>
    <f:metadata>
        <f:viewParam name="id" value="#{viewParamBean.id}">
            <f:convertNumber integerOnly="true"/>
            <f:validateLongRange minimum="0" maximum="100000"/>
        </f:viewParam>
        <f:viewAction action="#{viewParamBean.load}"/>
    </f:metadata>
    <h:head>
        <title>viewparam-get</title>
    </h:head>
    <h:body>
        <h:panelGroup rendered="#{not empty viewParamBean.row}">
            id=#{viewParamBean.row.id}
            name=#{viewParamBean.row.name}
            description=#{viewParamBean.row.description}
            qty=#{viewParamBean.row.quantity}
            price=<h:outputText value="#{viewParamBean.row.price}">
                      <f:convertNumber type="currency" currencyCode="EUR"/>
                  </h:outputText>
            date=<h:outputText value="#{viewParamBean.row.date}">
                     <f:convertDateTime type="localDate"/>
                 </h:outputText>
            active=#{viewParamBean.row.active}
        </h:panelGroup>
    </h:body>
</html>
