<html lang="#{facesContext.viewRoot.locale.language}"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets"
>
    <h:head>
        <title>repeat-inputs-heavy</title>
    </h:head>
    <h:body>
        <h:form id="form">
            <ui:repeat value="#{repeatBean.heavyInputRows}" var="row">
                <h:panelGroup layout="block">
                    <h:outputText value="#{row.id}"/>
                    <h:inputText value="#{row.name}">
                        <f:converter converterId="trimConverter"/>
                        <f:validator validatorId="lengthRangeValidator"/>
                    </h:inputText>
                    <h:inputText value="#{row.quantity}">
                        <f:convertNumber integerOnly="true"/>
                    </h:inputText>
                    <h:inputText value="#{row.price}">
                        <f:convertNumber type="currency" currencyCode="EUR"/>
                    </h:inputText>
                    <h:inputText value="#{row.date}"/>
                    <h:selectBooleanCheckbox value="#{row.active}"/>
                </h:panelGroup>
            </ui:repeat>
            <h:commandButton id="submit" value="Save" action="#{repeatBean.save}"/>
            <h:messages globalOnly="false"/>
        </h:form>
    </h:body>
</html>
