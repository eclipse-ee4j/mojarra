<html lang="#{facesContext.viewRoot.locale.language}"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
>
    <h:head>
        <title>table-inputs-heavy</title>
    </h:head>
    <h:body>
        <h:form id="form">
            <h:dataTable value="#{tableBean.heavyInputRows}" var="row">
                <h:column>
                    <f:facet name="header">#</f:facet>
                    <h:outputText value="#{row.id}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">Name</f:facet>
                    <h:inputText value="#{row.name}" required="true">
                        <f:converter converterId="trimConverter"/>
                        <f:validator validatorId="lengthRangeValidator"/>
                    </h:inputText>
                </h:column>
                <h:column>
                    <f:facet name="header">Qty</f:facet>
                    <h:inputText value="#{row.quantity}">
                        <f:convertNumber integerOnly="true"/>
                        <f:validateLongRange minimum="0" maximum="10000"/>
                    </h:inputText>
                </h:column>
                <h:column>
                    <f:facet name="header">Price</f:facet>
                    <h:inputText value="#{row.price}">
                        <f:convertNumber type="currency" currencyCode="EUR"/>
                    </h:inputText>
                </h:column>
                <h:column>
                    <f:facet name="header">Date</f:facet>
                    <h:inputText value="#{row.date}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">Active</f:facet>
                    <h:selectBooleanCheckbox value="#{row.active}"/>
                </h:column>
            </h:dataTable>
            <h:commandButton id="submit" value="Save" action="#{tableBean.save}"/>
            <h:messages globalOnly="false"/>
        </h:form>
    </h:body>
</html>
