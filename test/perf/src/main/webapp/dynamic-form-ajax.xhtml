<html lang="#{facesContext.viewRoot.locale.language}"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
>
    <h:head>
        <title>dynamic-form-ajax</title>
    </h:head>
    <h:body>
        <!--
            Idiomatic dynamic components: the input subtree is built programmatically by DynamicFormBean#build
            (a postAddToView listener) into the bound container, rather than declared here. The structure is stable
            across requests, so the ajax postback runs the full lifecycle over the dynamically-built inputs exactly
            like form-inputs-ajax.
        -->
        <h:form id="form">
            <h:panelGroup id="container" layout="block" binding="#{dynamicFormBean.container}">
                <f:event type="postAddToView" listener="#{dynamicFormBean.build}"/>
            </h:panelGroup>
            <h:commandButton id="submit" value="Submit">
                <f:ajax execute="@form" render="@form"/>
            </h:commandButton>
        </h:form>
    </h:body>
</html>
