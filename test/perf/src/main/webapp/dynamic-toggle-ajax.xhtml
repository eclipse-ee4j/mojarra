<html lang="#{facesContext.viewRoot.locale.language}"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
>
    <h:head>
        <title>dynamic-toggle-ajax</title>
    </h:head>
    <h:body>
        <!--
            DynamicToggleBean#toggle() adds/removes the input subtree under the in-view #{container} from the action.
            Mutating an in-view container after markInitialState drives Mojarra's dynamic add/remove path
            (StateContext tracking + DYNAMIC_COMPONENT marker + full-state-save/restore of the subtree) — the path
            no static scenario reaches. This is the scenario for benchmarking that path.
        -->
        <h:form id="form">
            <h:commandButton id="toggle" value="Toggle" action="#{dynamicToggleBean.toggle}">
                <f:ajax render="@form"/>
            </h:commandButton>
            <h:panelGroup id="container" layout="block"/>
        </h:form>
    </h:body>
</html>
